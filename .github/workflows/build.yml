name: Build Crossword App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: Crossword-Windows.exe
            build_cmd: pyinstaller --onefile --windowed --add-data "demo_questions.json;." --name "Crossword" main.py
          - os: macos-latest
            artifact: Crossword-Mac
            build_cmd: pyinstaller --onefile --windowed --add-data "demo_questions.json:." --name "Crossword" main.py

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: ${{ matrix.build_cmd }}

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Crossword-Windows
          path: dist/Crossword.exe

      - name: Package Mac app
        if: runner.os == 'macOS'
        run: cd dist && zip -r Crossword-Mac.zip Crossword.app

      - name: Upload Mac artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Crossword-Mac
          path: dist/Crossword-Mac.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Crossword-Windows/Crossword.exe
            artifacts/Crossword-Mac/Crossword-Mac.zip
          generate_release_notes: true
